<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google fonts</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap');

        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            color: black;

        }
        h1{
            font-family: Merienda ,'Times New Roman', Times, serif;
            font-size: 30px;
            font-style: italic;

        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio corrupti mollitia eaque earum sequi fugit eveniet. Dolorum voluptatibus quidem sequi aperiam, quae, adipisci in quasi eos voluptate excepturi nesciunt beatae.</p>
</body>
</html>
