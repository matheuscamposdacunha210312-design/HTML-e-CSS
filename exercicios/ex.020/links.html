<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = childreen
        
        
        
        
        
        
        */
        a {
            color: black;
            font-weight:bold;
            text-decoration: none;
        }
        a:visited{
            color: rgb(48, 0, 68);
        }
        a:hover{
            text-decoration: underline;
        }
        a:active{
            color:yellow;
        }
        a::before{
            content:'>';
            font-weight: bolder;
        }
        a::after{
            content:'<';
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo" target="_blank">Canal Do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
