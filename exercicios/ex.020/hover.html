<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        div > p {
            display: none;
        }
        div:hover {
            color: red;
        }
        div:hover > p {
            display: block;
        }

    </style>
</head>
<body>
    <h1>Exemplo de houver</h1>
    <p>passe o mouse sobre o texto abaixo</p>

    <div>
        passe o mouse aqui
        <p>texto escondido....</p>
    </div>

</body>
</html>
