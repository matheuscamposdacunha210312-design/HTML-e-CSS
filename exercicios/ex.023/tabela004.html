<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family:  Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        th , td{
            border: 1px solid rgba(0, 0, 0, 0.432);
            font-weight: bold;
            padding:5px;
            text-align: center;
        }
        td{
            color: rgba(80, 79, 79, 0.836);
        }
    </style>
</head>
<body>
    <table>
        <caption>
            Filmes Favoritos
        </caption>
        <thead>
            <tr>
                <th scope="col">Grupos</th>
                <th scope="col">Nomes</th>
                <th colspan="3" scope="colgroup">Filmes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="3" scope="rowgroup">Mulheres</th>
                <td> Ana 1</td>
                <td> Filme 1</td>
                <td> Filme 2</td>
                <td> Filme 3</td>
            </tr>
             <tr>
               
                <td> Ana 2</td>
                <td> Filme 1</td>
                <td> Filme 2</td>
                <td> Filme 3</td>
            </tr>
             <tr>
                
                <td> Ana 3</td>
                <td> Filme 1</td>
                <td> Filme 2</td>
                <td> Filme 3</td>
            </tr>
             <tr>
                <th rowspan="3" scope="rowgroup">Homens</th>
                <td> José 1</td>
                <td> Filme 1</td>
                <td> Filme 2</td>
                <td> Filme 3</td>
            </tr>
            <tr>
                <td> José 2</td>
                <td> Filme 1</td>
                <td> Filme 2</td>
                <td> Filme 3</td>
            </tr>
            <tr>
                <td> José 3</td>
                <td> Filme 1</td>
                <td> Filme 2</td>
                <td> Filme 3</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
